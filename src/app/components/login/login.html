<main class="login-page">
  <section class="login-panel">
    <p class="eyebrow">Mapa Media</p>
    <p class="description">
      El recorrido se puede ver sin iniciar sesion. Google solo se usa para activar la emision GPS.
    </p>

    <div class="actions">
      <button class="back-button" type="button" (click)="goBack()">
        Volver
      </button>

      <button class="google-button" type="button" (click)="login()" [disabled]="isSubmitting()">
        <span class="google-mark" aria-hidden="true">G</span>
        {{ isSubmitting() ? 'Comprobando cuenta...' : 'Entrar con Google' }}
      </button>
    </div>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </section>
</main>
