<main class="login-page">
  <section class="login-panel" aria-labelledby="login-title">
    <p class="eyebrow">Mapa Media</p>
    <h1 id="login-title">Inicia sesion para ver el recorrido</h1>
    <p class="description">
      Accede con tu cuenta de Google para abrir el mapa, consultar la ruta y compartir tu ubicacion.
    </p>

    <button class="google-button" type="button" (click)="login()" [disabled]="isSubmitting()">
      <span class="google-mark" aria-hidden="true">G</span>
      {{ isSubmitting() ? 'Abriendo Google...' : 'Entrar con Google' }}
    </button>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </section>
</main>
