<section class="mapa-page">
  @if (isGpsWriter()) {
    <p class="gps-recorder-status">{{ status() }} · {{ gpsRecorder.status() }}</p>

    <div class="gps-actions">
      <label class="time-field">
        <span>Hora de salida</span>
        <input
          type="time"
          [value]="selectedRaceStartTime()"
          (change)="updateRaceStartTime($event)"
          [disabled]="gpsRecorder.isRecording()"
        />
      </label>

      @if (gpsRecorder.isRecording()) {
        <button class="location-button danger" type="button" (click)="deactivateGps()">
          Desactivar
        </button>
      } @else {
        <button class="location-button" type="button" (click)="activateGps()" [disabled]="isLoading()">
          {{ isLoading() ? 'Activando GPS...' : 'Activar GPS' }}
        </button>
      }
    </div>
  } @else if (!auth.isLoggedIn()) {
    <div class="gps-actions">
      <button class="location-button secondary" type="button" (click)="loginAsEmitter()">
        Administrador
      </button>
    </div>
  }
